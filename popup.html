<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tab Audio Normalizer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --surface: #0c0c0c;
      --surface-2: #141414;
      --border: #1e1e1e;
      --text: #e5e7eb;
      --text-dim: #8a8f98;
      --text-faint: #5c6067;
      --red: #ff003c;
      --cyan: #00fff0;
      --green: #39ff14;
      --yellow: #ffe600;
      --purple: #bf00ff;
      --gray: #9ca3af;
      --danger: #dc2626;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-width: 320px;
      background:
        radial-gradient(circle at 50% -10%, rgba(255, 0, 60, 0.22), transparent 30%),
        radial-gradient(circle at 100% 0, rgba(191, 0, 255, 0.12), transparent 26%),
        linear-gradient(180deg, #070707 0%, var(--bg) 100%);
      color: var(--text);
      font: 13px/1.4 "Share Tech Mono", "Segoe UI", system-ui, sans-serif;
    }

    body {
      position: relative;
      padding: 10px;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 0, 60, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 60, 0.035) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
      opacity: 0.78;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.22) 2px,
        rgba(0, 0, 0, 0.22) 4px
      );
      pointer-events: none;
      opacity: 0.45;
    }

    .panel {
      position: relative;
      width: 100%;
      background:
        linear-gradient(180deg, rgba(20, 20, 20, 0.98), rgba(8, 8, 8, 0.99)),
        linear-gradient(90deg, rgba(255, 0, 60, 0.04), rgba(0, 255, 240, 0.02));
      border: 1px solid rgba(255, 0, 60, 0.3);
      box-shadow:
        0 0 0 1px rgba(255, 0, 60, 0.12),
        0 0 32px rgba(255, 0, 60, 0.18),
        0 0 56px rgba(191, 0, 255, 0.08),
        0 22px 48px rgba(0, 0, 0, 0.72),
        inset 0 0 24px rgba(255, 0, 60, 0.04);
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 0, 60, 0.08), transparent 22%),
        linear-gradient(315deg, rgba(0, 255, 240, 0.08), transparent 20%);
      pointer-events: none;
    }

    .panel::after {
      content: "";
      position: absolute;
      top: 0;
      left: 18px;
      right: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 240, 0.7), rgba(255, 0, 60, 0.8), transparent);
      box-shadow: 0 0 12px rgba(255, 0, 60, 0.4);
      pointer-events: none;
    }

    .corner,
    .corner::before,
    .corner::after {
      position: absolute;
      width: 10px;
      height: 10px;
      pointer-events: none;
    }

    .corner.tl { top: 0; left: 0; border-top: 1px solid rgba(255, 0, 60, 0.5); border-left: 1px solid rgba(255, 0, 60, 0.5); }
    .corner.tr { top: 0; right: 0; border-top: 1px solid rgba(255, 0, 60, 0.5); border-right: 1px solid rgba(255, 0, 60, 0.5); }
    .corner.bl { bottom: 0; left: 0; border-bottom: 1px solid rgba(255, 0, 60, 0.5); border-left: 1px solid rgba(255, 0, 60, 0.5); }
    .corner.br { bottom: 0; right: 0; border-bottom: 1px solid rgba(255, 0, 60, 0.5); border-right: 1px solid rgba(255, 0, 60, 0.5); }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255, 0, 60, 0.18);
      background:
        linear-gradient(180deg, rgba(18, 18, 18, 0.96), rgba(10, 10, 10, 0.92)),
        linear-gradient(90deg, rgba(255, 0, 60, 0.06), transparent 55%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 2px solid var(--red);
      color: var(--red);
      background: linear-gradient(180deg, rgba(255, 0, 60, 0.14), rgba(255, 0, 60, 0.04));
      clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
      box-shadow: 0 0 18px rgba(255, 0, 60, 0.3), inset 0 0 10px rgba(255, 0, 60, 0.1);
      font-size: 15px;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      position: relative;
      display: inline-block;
      color: var(--red);
      font: 700 24px/1 "Arial Narrow", Impact, sans-serif;
      letter-spacing: 0.28em;
      text-shadow: 0 0 10px rgba(255, 0, 60, 0.6), 0 0 26px rgba(255, 0, 60, 0.22);
    }

    .brand-title::before,
    .brand-title::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.75;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-direction: alternate-reverse;
    }

    .brand-title::before {
      color: var(--cyan);
      animation-name: glitch-1;
      animation-duration: 2.8s;
    }

    .brand-title::after {
      color: var(--red);
      animation-name: glitch-2;
      animation-duration: 2.2s;
    }

    .brand-subtitle {
      margin-top: 2px;
      color: var(--text-faint);
      font-size: 9px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .live {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      box-shadow: 0 0 8px rgba(57, 255, 20, 0.85), 0 0 18px rgba(57, 255, 20, 0.4);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .live-label {
      color: var(--green);
      font-size: 8px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
    }

    .content {
      padding: 12px;
      position: relative;
    }

    .content::before {
      content: "SYS ONLINE / PEAK CONTROL READY";
      display: block;
      margin-bottom: 10px;
      padding: 6px 10px 5px;
      border: 1px solid rgba(255, 0, 60, 0.18);
      background: linear-gradient(90deg, rgba(255, 0, 60, 0.12), rgba(255, 0, 60, 0.02));
      color: var(--red);
      font-size: 8px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 0, 60, 0.35);
      box-shadow: inset 0 0 12px rgba(255, 0, 60, 0.05);
    }

    .spectrum-shell {
      position: relative;
      padding: 10px;
      border: 1px solid rgba(255, 0, 60, 0.18);
      background: linear-gradient(180deg, rgba(14, 14, 14, 0.96), rgba(6, 6, 6, 0.96));
      box-shadow: inset 0 0 16px rgba(255, 0, 60, 0.04);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    .spectrum-shell::before {
      content: "INPUT ACTIVITY";
      position: absolute;
      top: 5px;
      left: 10px;
      color: var(--text-faint);
      font-size: 7px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }

    .spectrum {
      display: flex;
      align-items: end;
      gap: 3px;
      height: 60px;
      margin-top: 12px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 0, 60, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 0, 60, 0.05), transparent 60%),
        var(--bg);
      overflow: hidden;
    }

    .spectrum span {
      flex: 1 1 0;
      min-width: 0;
      background: linear-gradient(180deg, rgba(0, 255, 240, 0.25), rgba(0, 255, 240, 0.9));
      box-shadow: 0 0 10px rgba(0, 255, 240, 0.28);
      animation: bounce 1.6s ease-in-out infinite;
      transform-origin: bottom center;
    }

    .spectrum span:nth-child(3n) {
      background: linear-gradient(180deg, rgba(255, 230, 0, 0.18), rgba(255, 0, 60, 0.72));
      box-shadow: 0 0 12px rgba(255, 0, 60, 0.24);
    }

    .spectrum span:nth-child(1) { height: 34%; animation-delay: -0.2s; }
    .spectrum span:nth-child(2) { height: 58%; animation-delay: -0.8s; }
    .spectrum span:nth-child(3) { height: 76%; animation-delay: -0.5s; }
    .spectrum span:nth-child(4) { height: 44%; animation-delay: -1.0s; }
    .spectrum span:nth-child(5) { height: 68%; animation-delay: -0.3s; }
    .spectrum span:nth-child(6) { height: 82%; animation-delay: -1.2s; }
    .spectrum span:nth-child(7) { height: 52%; animation-delay: -0.6s; }
    .spectrum span:nth-child(8) { height: 70%; animation-delay: -0.9s; }
    .spectrum span:nth-child(9) { height: 40%; animation-delay: -0.4s; }
    .spectrum span:nth-child(10) { height: 62%; animation-delay: -0.7s; }
    .spectrum span:nth-child(11) { height: 78%; animation-delay: -0.1s; }
    .spectrum span:nth-child(12) { height: 48%; animation-delay: -1.1s; }

    .section-label {
      margin: 12px 0 8px;
      color: var(--text-faint);
      font-size: 8px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
    }

    .hud-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .hud-chip {
      padding: 7px 8px 6px;
      border: 1px solid rgba(255, 0, 60, 0.14);
      background: linear-gradient(180deg, rgba(15, 15, 15, 0.95), rgba(7, 7, 7, 0.95));
      text-transform: uppercase;
    }

    .hud-chip-label {
      display: block;
      color: var(--text-faint);
      font-size: 7px;
      letter-spacing: 0.22em;
    }

    .hud-chip-value {
      display: block;
      margin-top: 4px;
      color: var(--cyan);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-shadow: 0 0 8px rgba(0, 255, 240, 0.24);
    }

    .control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px;
      border: 1px solid rgba(0, 255, 240, 0.2);
      background:
        linear-gradient(180deg, rgba(20, 20, 20, 0.96), rgba(7, 7, 7, 0.98)),
        linear-gradient(90deg, rgba(0, 255, 240, 0.06), transparent 50%);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      box-shadow: inset 0 0 14px rgba(0, 255, 240, 0.05);
    }

    .site-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .site-label {
      color: var(--cyan);
      font-size: 8px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(0, 255, 240, 0.18);
    }

    #hostname {
      min-width: 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      word-break: break-word;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.08);
    }

    #toggle {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      flex: 0 0 auto;
      width: 60px;
      height: 28px;
      margin: 0;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(8, 8, 8, 1), rgba(14, 14, 14, 1));
      border: 1px solid rgba(255, 0, 60, 0.22);
      clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    #toggle::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 18px;
      background: #50545c;
      clip-path: polygon(3px 0, 100% 0, calc(100% - 3px) 100%, 0 100%);
      transition: left 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    #toggle:checked {
      background: linear-gradient(180deg, rgba(255, 0, 60, 0.18), rgba(120, 0, 40, 0.16));
      border-color: var(--red);
      box-shadow: 0 0 16px rgba(255, 0, 60, 0.28), inset 0 0 12px rgba(255, 0, 60, 0.14);
    }

    #toggle:checked::before {
      left: 35px;
      background: var(--red);
      box-shadow: 0 0 10px rgba(255, 0, 60, 0.7), 0 0 20px rgba(255, 0, 60, 0.25);
    }

    #toggle:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .status {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 12px;
      align-items: center;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid rgba(255, 230, 0, 0.22);
      background:
        linear-gradient(180deg, rgba(10, 10, 10, 0.98), rgba(5, 5, 5, 0.96)),
        linear-gradient(90deg, rgba(255, 230, 0, 0.05), transparent 55%);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      box-shadow: inset 0 0 12px rgba(255, 230, 0, 0.04);
    }

    .dot {
      width: 12px;
      height: 12px;
      background: var(--gray);
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset;
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    .dot.green {
      background: var(--green);
      box-shadow: 0 0 12px rgba(57, 255, 20, 0.75);
    }

    .dot.red {
      background: var(--danger);
      box-shadow: 0 0 12px rgba(220, 38, 38, 0.75);
    }

    .status-copy {
      min-width: 0;
    }

    .status-label {
      color: var(--yellow);
      font-size: 8px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255, 230, 0, 0.2);
    }

    #status-text {
      display: block;
      margin-top: 4px;
      color: var(--text-dim);
      font-size: 12px;
    }

    .status-meta {
      margin-top: 5px;
      color: var(--text-faint);
      font-size: 7px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 0, 60, 0.14);
      color: var(--text-faint);
      font-size: 8px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .footer strong {
      color: var(--red);
      font-weight: 700;
      text-shadow: 0 0 8px rgba(255, 0, 60, 0.45);
    }

    @keyframes glitch-1 {
      0%, 100% { clip-path: inset(0 0 95% 0); transform: translate(0); }
      10% { clip-path: inset(20% 0 60% 0); transform: translate(-3px, 1px); }
      20% { clip-path: inset(50% 0 20% 0); transform: translate(3px, -1px); }
      30% { clip-path: inset(0 0 85% 0); transform: translate(-2px, 0); }
      40% { clip-path: inset(70% 0 5% 0); transform: translate(2px, 1px); }
      50% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, -1px); }
      60% { clip-path: inset(0 0 95% 0); transform: translate(0); }
    }

    @keyframes glitch-2 {
      0%, 100% { clip-path: inset(90% 0 0 0); transform: translate(0); }
      15% { clip-path: inset(40% 0 30% 0); transform: translate(3px, -1px); }
      25% { clip-path: inset(60% 0 10% 0); transform: translate(-3px, 1px); }
      35% { clip-path: inset(80% 0 0 0); transform: translate(1px, 0); }
      45% { clip-path: inset(30% 0 50% 0); transform: translate(-2px, 1px); }
      55% { clip-path: inset(90% 0 0 0); transform: translate(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @keyframes bounce {
      0%, 100% { transform: scaleY(0.72); opacity: 0.7; }
      50% { transform: scaleY(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="panel">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <header class="header">
      <div class="brand">
        <div class="brand-mark">&#9654;</div>
        <div class="brand-copy">
          <div class="brand-title" data-text="VBR">VBR</div>
          <div class="brand-subtitle">Audio Normalizer</div>
        </div>
      </div>
      <div class="live" aria-hidden="true">
        <span class="live-label">Live</span>
        <span class="live-dot"></span>
      </div>
    </header>

    <div class="content">
      <div class="spectrum-shell" aria-hidden="true">
        <div class="spectrum">
          <span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div class="hud-row" aria-hidden="true">
        <div class="hud-chip">
          <span class="hud-chip-label">Mode</span>
          <span class="hud-chip-value">AUTO</span>
        </div>
        <div class="hud-chip">
          <span class="hud-chip-label">Drive</span>
          <span class="hud-chip-value">+6dB</span>
        </div>
        <div class="hud-chip">
          <span class="hud-chip-label">Target</span>
          <span class="hud-chip-value">-1dB</span>
        </div>
      </div>

      <div class="section-label">Current Site</div>

      <label class="control" for="toggle">
        <div class="site-copy">
          <span class="site-label">Per-site normalizer</span>
          <span id="hostname">...</span>
        </div>
        <input type="checkbox" id="toggle" aria-label="Toggle audio normalizer for this site">
      </label>

      <div class="status" role="status" aria-live="polite">
        <span id="status-dot" class="dot"></span>
        <div class="status-copy">
          <div class="status-label">Signal Status</div>
          <span id="status-text">Checking current tab…</span>
          <div class="status-meta">Realtime hook telemetry</div>
        </div>
      </div>

      <div class="footer">
        <span>Mode <strong>Auto</strong></span>
        <span>Popup UI X1</span>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
