<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Audio Normalizer</title>
  <style>
    body { margin: 0; padding: 12px; width: 220px; font: 13px system-ui, sans-serif; }
    label { display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; }
    #hostname { word-break: break-all; }
    .status { display: flex; align-items: center; gap: 8px; margin-top: 10px; color: #4b5563; }
    .dot { width: 10px; height: 10px; border-radius: 999px; background: #9ca3af; box-shadow: 0 0 0 1px rgba(0,0,0,0.12) inset; }
    .dot.green { background: #16a34a; }
    .dot.red { background: #dc2626; }
  </style>
</head>
<body>
  <label>
    <span id="hostname">...</span>
    <input type="checkbox" id="toggle">
  </label>
  <div class="status">
    <span id="status-dot" class="dot"></span>
    <span id="status-text">Checking current tab…</span>
  </div>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
