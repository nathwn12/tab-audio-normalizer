<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tab Audio Normalizer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #2a2a2a;
      --surface: #333333;
      --surface-hover: #3f3f3f;
      --text: #e5e7eb;
      --text-dim: #9ca3af;
      --text-faint: #6b7280;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --track: #4b5563;
      --success: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-width: 260px;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.4 system-ui, -apple-system, sans-serif;
    }

    body { padding: 16px; }

    .popup { display: flex; flex-direction: column; gap: 14px; }

    .site-name {
      text-align: center;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .gain-readout {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    #gain-slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--track);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    #gain-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid var(--bg);
    }

    #gain-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid var(--bg);
    }

    #gain-slider:disabled { opacity: 0.45; cursor: not-allowed; }

    .toggles {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .preset-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 6px 12px;
      background: var(--surface);
      color: var(--text-dim);
      font: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease, transform 120ms ease;
    }

    .preset-button:hover { background: var(--surface-hover); color: var(--text); }
    .preset-button:active { transform: translateY(1px); }
    .preset-button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .mode-note {
      text-align: center;
      color: var(--text-faint);
      font-size: 11px;
      line-height: 1.3;
    }

    .toggle-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--surface);
      border-radius: 999px;
      cursor: pointer;
      user-select: none;
      transition: background 120ms ease;
    }

    .toggle-pill:hover { background: #3f3f3f; }

    .toggle-pill input {
      -webkit-appearance: none;
      appearance: none;
      width: 32px;
      height: 18px;
      background: var(--track);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      outline: none;
      transition: background 120ms ease;
    }

    .toggle-pill input::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #d1d5db;
      border-radius: 50%;
      transition: transform 120ms ease;
    }

    .toggle-pill input:checked { background: var(--accent); }
    .toggle-pill input:checked::before {
      transform: translateX(14px);
      background: #fff;
    }

    .toggle-pill input:disabled { opacity: 0.4; cursor: not-allowed; }

    .toggle-pill span {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--text-faint);
      font-size: 11px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
    }

    #status-dot.green { background: var(--success); }
    #status-dot.red { background: var(--danger); }
  </style>
</head>
<body>
  <div class="popup">
    <div class="site-name" id="hostname">...</div>
    <div class="gain-readout" id="gain-value">+0 dB</div>
    <input type="range" id="gain-slider" min="-12" max="12" step="0.5" value="0" aria-label="Adjust gain">
    <div class="preset-row" aria-label="Quick gain presets">
      <button type="button" class="preset-button" data-preset="speech">Speech</button>
      <button type="button" class="preset-button" data-preset="music">Music</button>
      <button type="button" class="preset-button" data-preset="boost">Boost</button>
    </div>
    <div class="toggles">
      <label class="toggle-pill">
        <input type="checkbox" id="remember" checked aria-label="Remember settings per site">
        <span>Remember</span>
      </label>
      <label class="toggle-pill">
        <input type="checkbox" id="toggle" aria-label="Toggle normalizer">
        <span>Active</span>
      </label>
    </div>
    <div class="mode-note">Core loudness stays fixed at -16 LUFS with a -1 dB ceiling.</div>
    <div class="status">
      <span id="status-dot"></span>
      <span id="status-text">Checking…</span>
    </div>
  </div>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
